<body>
<div id="task-detail-overlay" class="task-detail-overlay" onclick="if(event.target===this)closeTaskDetail()"></div>

<div class="header">
  <div class="header-top">
    <h1><img src="assets/logo.jpg" alt="AI Fleet" class="logo"> AI Fleet Dev Team</h1>
    <div class="header-controls">
      <select id="project-selector">
        <option value="__all__">All Projects</option>
      </select>
      <button class="refresh-btn" onclick="refresh()" title="Refresh">
        <span class="icon">↻</span>
      </button>
    </div>
  </div>
  <div class="last-updated" id="last-updated"></div>
</div>

<div class="main" id="main-content">
  <div class="loading">Loading projects…</div>
</div>

<div class="footer">
  AI Fleet Dev Team Dashboard · Auto-updated by pipeline · Powered by VIRGIL
</div>

<script>
const DATA_BASE = './data';
const MANIFEST = './data/projects.json';

let allProjects = {};
let currentFilter = '__all__';

// Status icons
const STATUS_ICONS = {
  completed: '✓',
  running: '⟳',
  in_progress: '⟳',
  failed: '✗',
  pending: '·',
  skipped: '⊘'
};

// GLOBAL formatters — must live at module scope so BOTH renderProject() and
// showTaskDetail() can use them. (Bug fix: showTaskDetail referenced a
// formatDuration that was only a local const inside renderProject, so opening
// the detail modal for any task with costUSD threw ReferenceError and silently
// failed. After the cost backfill every task has costUSD, which exposed it for
// all older tasks.)
function formatDuration(s) {
  if (!s) return '\u2014';
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), ss = s%60;
  if (h > 0) return `${h}h ${m}m`;
  return m > 0 ? `${m}m ${ss}s` : `${ss}s`;
}
function formatTokens(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n.toString();
}

// A completed task is "landed" once its PR is merged to main. Until then it is
// pipeline-complete but not landed — shown yellow instead of green. `landed`
// defaults to true for legacy tasks with no flag, so old data stays green.
function isLanded(task) {
  return task.status === 'completed' && task.landed === false ? false : true;
}
// Extra CSS class for a task's status icon/rect (adds `not-landed` when apt).
function landedClass(task) {
  return (task.status === 'completed' && task.landed === false) ? ' not-landed' : '';
}
// Human label for the completed sub-state (used in tooltips/badges).
function landedLabel(task) {
  if (task.status !== 'completed') return '';
  return task.landed === false ? 'complete (not yet merged to main)' : 'complete + landed on main';
}

function formatTimeAgo(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const now = new Date();
  const diffMs = now - d;
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return `${days}d ago`;
  return d.toLocaleDateString();
}

async function loadManifest() {
  try {
    const resp = await fetch(MANIFEST + '?t=' + Date.now());
    if (!resp.ok) return [];
    return await resp.json();
  } catch {
    return [];
  }
}

async function loadProjectData(slug) {
  try {
    const resp = await fetch(`${DATA_BASE}/${slug}.json?t=${Date.now()}`);
    if (!resp.ok) return null;
    return await resp.json();
  } catch {
    return null;
  }
}

async function loadAll() {
  const manifest = await loadManifest();

  if (!manifest.length) {
    renderEmpty();
    return;
  }

  const selector = document.getElementById('project-selector');
  // Clear and rebuild options
  selector.innerHTML = '<option value="__all__">All Projects</option>';
  // Update count after loading
  setTimeout(() => {
    const allOpt = selector.querySelector('option[value="__all__"]');
    const count = Object.keys(allProjects).length;
    if (count > 0) allOpt.textContent = `All Projects (${count})`;
  }, 0);

  allProjects = {};

  for (const entry of manifest) {
    const data = await loadProjectData(entry.slug);
    if (data) {
      allProjects[entry.slug] = { ...entry, ...data };
      const opt = document.createElement('option');
      opt.value = entry.slug;
      opt.textContent = entry.name;
      selector.appendChild(opt);
    }
  }

  selector.value = currentFilter;
  await loadOutputs();
  renderDashboard();
}

function renderEmpty() {
  document.getElementById('main-content').innerHTML = `
    <div class="no-projects">
      <div class="icon">📡</div>
      <h2>No projects registered</h2>
      <p>Projects will appear here when their pipelines start reporting status.</p>
    </div>
  `;
}

function renderDashboard() {
  const container = document.getElementById('main-content');
  const slugs = currentFilter === '__all__'
    ? Object.keys(allProjects)
    : [currentFilter].filter(s => allProjects[s]);

  if (!slugs.length) {
    renderEmpty();
    return;
  }

  let html = '';
  for (const slug of slugs) {
    html += renderProject(allProjects[slug]);
  }

  container.innerHTML = html;
  updateTimestamp();
}

function renderProject(project) {
  const tasks = project.tasks || [];
  const total = tasks.length;
  const completed = tasks.filter(t => t.status === 'completed').length;
  const running = tasks.filter(t => t.status === 'running').length;
  const failed = tasks.filter(t => t.status === 'failed').length;
  const pending = tasks.filter(t => t.status === 'pending').length;
  const pct = total ? Math.round((completed / total) * 100) : 0;

  // System status
  let sysStatus, sysClass, sysText;
  if (failed > 0) {
    sysClass = 'stopped';
    sysText = 'STOPPED — Task failed, needs human intervention';
  } else if (running > 0) {
    sysClass = 'running';
    sysText = 'System running — no action needed';
  } else if (completed === total && total > 0) {
    sysClass = 'complete';
    sysText = 'All tasks complete — pipeline finished';
  } else {
    sysClass = 'idle';
    sysText = 'Pipeline idle';
  }

  // Build phase name lookup from project metadata
  const phaseNames = {};
  if (project.phases) {
    for (const p of project.phases) {
      phaseNames[p.id] = p.name;
    }
  }

  // Group tasks by phase
  const phases = {};
  for (const task of tasks) {
    const phase = task.phase || 'Ungrouped';
    if (!phases[phase]) phases[phase] = [];
    phases[phase].push(task);
  }

  // --- Cost aggregation ---
  const totalCost = tasks.reduce((sum, t) => sum + (t.costUSD || 0), 0);
  const totalTurns = tasks.reduce((sum, t) => sum + (t.numTurns || 0), 0);
  const totalDuration = tasks.reduce((sum, t) => sum + (t.durationSeconds || 0), 0);
  const totalInputTokens = tasks.reduce((sum, t) => sum + (t.inputTokens || 0), 0);
  const totalOutputTokens = tasks.reduce((sum, t) => sum + (t.outputTokens || 0), 0);
  const totalCacheRead = tasks.reduce((sum, t) => sum + (t.cacheReadTokens || 0), 0);
  const avgCostPerTask = completed > 0 ? totalCost / completed : 0;
  const estimatedTotal = avgCostPerTask * total;
  const formatCost = (v) => v < 0.01 ? '$0.00' : '$' + v.toFixed(2);
  const formatDuration = (s) => { if (!s) return '—'; const h = Math.floor(s/3600); const m = Math.floor((s%3600)/60); const ss = s%60; if (h > 0) return `${h}h ${m}m`; return m > 0 ? `${m}m ${ss}s` : `${ss}s`; };
  // Compact wall-clock like "9:42 PM" in the viewer's local time.
  const formatClock = (iso) => { if (!iso) return ''; const d = new Date(iso); if (isNaN(d)) return ''; return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }); };
  const formatTokens = (n) => { if (!n) return '0'; if (n >= 1000000) return (n/1000000).toFixed(1) + 'M'; if (n >= 1000) return (n/1000).toFixed(1) + 'K'; return n.toString(); };

  let projectHtml = '';

  // Project title
  const projectCount = Object.keys(allProjects).length;
  if (currentFilter === '__all__' && projectCount > 0) {
    const activePhase = tasks.find(t => t.status === 'running')?.phase || tasks[0]?.phase || '';
    projectHtml += `<h2 style="font-size:16px; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border);">${project.name || project.slug} <span style="font-size:12px; color:var(--text-muted); font-weight:400;">— ${total} tasks, ${Object.keys(phases).length} phases</span></h2>`;
  }

  // Overview cards (with cost)
  projectHtml += `
    <div class="overview">
      <div class="stat-card completed"><div class="value">${completed}</div><div class="label">Completed</div></div>
      <div class="stat-card running"><div class="value">${running}</div><div class="label">Running</div></div>
      <div class="stat-card failed"><div class="value">${failed}</div><div class="label">Failed</div></div>
      <div class="stat-card pending"><div class="value">${pending}</div><div class="label">Pending</div></div>
    </div>
  `;

  // Cost summary bar
  if (totalCost > 0) {
    const MONTHLY_PLAN_COST = 200;
    let savingsNote;
    if (estimatedTotal > MONTHLY_PLAN_COST) {
      const savingsPct = Math.round((1 - MONTHLY_PLAN_COST / estimatedTotal) * 100);
      savingsNote = `⚡ Est. token cost <strong>${formatCost(estimatedTotal)}</strong> vs <strong>$${MONTHLY_PLAN_COST}/mo</strong> Max plan = <strong style="color:var(--green)">${savingsPct}% savings</strong>`;
    } else {
      const pctUsed = Math.round((estimatedTotal / MONTHLY_PLAN_COST) * 100);
      savingsNote = `⚡ Est. token cost <strong>${formatCost(estimatedTotal)}</strong> vs <strong>$${MONTHLY_PLAN_COST}/mo</strong> Max plan — <strong>${pctUsed}%</strong> of plan value used so far`;
    }
    projectHtml += `
    <div class="cost-summary">
      <div class="cost-item"><span class="cost-label">API Cost (est.)</span><span class="cost-value">${formatCost(totalCost)}</span></div>
      <div class="cost-item"><span class="cost-label">Avg/Task</span><span class="cost-value">${formatCost(avgCostPerTask)}</span></div>
      <div class="cost-item"><span class="cost-label">Est. Total</span><span class="cost-value">${formatCost(estimatedTotal)}</span></div>
      <div class="cost-item"><span class="cost-label">Turns</span><span class="cost-value">${totalTurns}</span></div>
      <div class="cost-item"><span class="cost-label">Time</span><span class="cost-value">${formatDuration(totalDuration)}</span></div>
      <div class="cost-item"><span class="cost-label">Tokens</span><span class="cost-value" title="In: ${formatTokens(totalInputTokens)} | Out: ${formatTokens(totalOutputTokens)} | Cache: ${formatTokens(totalCacheRead)}">${formatTokens(totalInputTokens + totalOutputTokens + totalCacheRead)}</span></div>
      <div class="cost-footer">${savingsNote}<br><span class="cost-footnote">Costs are estimated API-equivalent token values. Actual billing is the flat $${MONTHLY_PLAN_COST}/mo Max subscription. Value above that = total value extracted from the system beyond subscription cost.</span></div>
    </div>
    `;
  }

  // Progress bar
  const compPct = total ? (completed / total * 100) : 0;
  const runPct = total ? (running / total * 100) : 0;
  const failPct = total ? (failed / total * 100) : 0;

  projectHtml += `
    <div class="progress-container">
      <div class="progress-bar-bg">
        ${compPct > 0 ? `<div class="progress-segment completed" style="width:${compPct}%">${compPct >= 8 ? completed : ''}</div>` : ''}
        ${runPct > 0 ? `<div class="progress-segment running" style="width:${runPct}%"></div>` : ''}
        ${failPct > 0 ? `<div class="progress-segment failed" style="width:${failPct}%"></div>` : ''}
      </div>
      <div class="progress-label">
        <span>${pct}% complete</span>
        <span>${completed}/${total} tasks</span>
      </div>
    </div>
  `;

  // System status banner
  projectHtml += `
    <div class="system-status ${sysClass}">
      <div class="status-dot"></div>
      <span>${sysText}</span>
    </div>
  `;

  // View toggle
  const projId = (project.slug || 'p').replace(/[^a-z0-9]/g, '_');
  const allTasksDone = (project.tasks || []).length > 0 && (project.tasks || []).every(t => t.status === 'completed');
  projectHtml += `
    <div class="view-toggle">
      <button class="active" onclick="switchView('${projId}','list')">📋 List</button>
      <button onclick="switchView('${projId}','graph')">🕸️ Graph</button>
      ${allTasksDone ? `<button onclick="switchView('${projId}','outputs')">🎯 Output(s)</button>` : ''}
    </div>
    <div id="view-list-${projId}">
  `;

  // Phase sections
  for (const [phaseName, phaseTasks] of Object.entries(phases)) {
    const phaseCompleted = phaseTasks.filter(t => t.status === 'completed').length;
    const phaseRunning = phaseTasks.filter(t => t.status === 'running').length;
    const phaseFailed = phaseTasks.filter(t => t.status === 'failed').length;
    const phaseTotal = phaseTasks.length;

    let badgeClass, badgeText;
    if (phaseFailed > 0) {
      badgeClass = 'has-failures';
      badgeText = `${phaseFailed} failed`;
    } else if (phaseCompleted === phaseTotal) {
      badgeClass = 'all-done';
      badgeText = 'Done';
    } else if (phaseRunning > 0 || phaseCompleted > 0) {
      badgeClass = 'in-progress';
      badgeText = `${phaseCompleted}/${phaseTotal}`;
    } else {
      badgeClass = 'not-started';
      badgeText = 'Not started';
    }

    // Auto-collapse fully-completed phases to keep finished rounds tidy (Jon is
    // fine with this now that the detail modal works when expanded). The phase
    // header (▾ chevron) remains a manual toggle to expand and click into any
    // task. In-progress / failed phases stay open so active work is visible.
    const collapsed = (phaseCompleted === phaseTotal && phaseFailed === 0) ? ' collapsed' : '';

    // Format phase header: "Phase 1 — Foundation" style
    const phaseLabel = phaseNames[phaseName]
      ? `${phaseName} — ${phaseNames[phaseName]}`
      : phaseName;

    projectHtml += `
      <div class="phase${collapsed}">
        <div class="phase-header" onclick="this.parentElement.classList.toggle('collapsed')">
          <h3>
            <span class="phase-chevron">▾</span>
            ${phaseLabel}
          </h3>
          <span class="phase-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="task-list">
    `;

    for (const task of phaseTasks) {
      const deps = task.depends_on && task.depends_on.length
        ? `→ ${task.depends_on.join(', ')}`
        : '';

      const timeAgo = task.lastActivity ? formatTimeAgo(task.lastActivity) : '';
      // Prefix estimated (backfilled) costs with a tilde so they are visually
      // distinct from real, captured costs. Real costs render plain.
      const taskCost = task.costUSD ? (task.costEstimated ? '~' : '') + formatCost(task.costUSD) : '';

      // Timing bits: start clock + total duration (live elapsed if in progress).
      const startClock = task.startedAt ? formatClock(task.startedAt) : '';
      let durText = '';
      if (task.durationSeconds) {
        durText = formatDuration(task.durationSeconds);
      } else if (task.status === 'in_progress' && task.startedAt) {
        const elapsed = Math.max(0, Math.floor((Date.now() - new Date(task.startedAt).getTime()) / 1000));
        durText = formatDuration(elapsed) + '…';
      }

      // Build the muted metadata line under the title from available parts,
      // separated by a thin dot so nothing wraps mid-phrase.
      const metaParts = [];
      if (startClock) metaParts.push(`<span class="task-timing">Started ${startClock}</span>`);
      if (durText) metaParts.push(`<span class="task-timing">${durText}</span>`);
      if (taskCost) metaParts.push(`<span class="task-cost"${task.costEstimated ? ' title="Estimated (backfilled from duration × measured rate)"' : ''}>${taskCost}</span>`);
      if (timeAgo) metaParts.push(`<span class="task-time">${timeAgo}</span>`);
      if (deps) metaParts.push(`<span class="task-deps">${deps}</span>`);
      const metaLine = metaParts.length
        ? `<div class="task-meta">${metaParts.join('<span class="sep">·</span>')}</div>`
        : '';

      projectHtml += `
        <div class="task-row" onclick="event.stopPropagation(); showTaskDetail('${project.slug}','${task.id}')">
          <div class="task-status-icon ${task.status}${landedClass(task)}"${task.status === 'completed' ? ` title="${landedLabel(task)}"` : ''}>${(task.status === 'in_progress' || task.status === 'running') ? `<span class="spin-glyph">${STATUS_ICONS[task.status]}</span>` : (STATUS_ICONS[task.status] || '·')}</div>
          <div class="task-main">
            <div class="task-line1">
              <span class="task-id">${task.id}</span>
              <span class="task-name">${task.name}</span>
            </div>
            ${metaLine}
          </div>
        </div>
      `;
    }

    projectHtml += `
        </div>
      </div>
    `;
  }

  // Close list view div
  projectHtml += `</div>`;

  // Graph view (hidden by default)
  projectHtml += `<div id="view-graph-${projId}" style="display:none">`;
  projectHtml += renderDepGraph(project, phaseNames);
  projectHtml += `</div>`;

  // Output(s) view (hidden by default)
  projectHtml += `<div id="view-outputs-${projId}" style="display:none" class="outputs-view">`;
  projectHtml += renderOutputsView(project);
  projectHtml += `</div>`;

  // Last updated for this project
  if (project.updated_at) {
    const d = new Date(project.updated_at);
    projectHtml += `<div style="font-size:11px; color:var(--text-muted); margin-top:12px; margin-bottom:24px;">Project data updated: ${d.toLocaleString()}</div>`;
  }

  return projectHtml;
}

function updateTimestamp() {
  document.getElementById('last-updated').textContent = 'Dashboard refreshed: ' + new Date().toLocaleTimeString();
}

async function refresh() {
  const btn = document.querySelector('.refresh-btn');
  btn.classList.add('spinning');
  await loadAll();
  setTimeout(() => btn.classList.remove('spinning'), 500);
}

// Project selector
document.getElementById('project-selector').addEventListener('change', (e) => {
  currentFilter = e.target.value;
  renderDashboard();
});

// Auto-refresh every 60s
setInterval(refresh, 60000);

// View toggle
function switchView(projId, view) {
  const listEl = document.getElementById('view-list-' + projId);
  const graphEl = document.getElementById('view-graph-' + projId);
  const outputsEl = document.getElementById('view-outputs-' + projId);
  if (!listEl || !graphEl) return;
  const toggle = listEl.parentElement.querySelector('.view-toggle');
  if (!toggle) return;
  const btns = toggle.querySelectorAll('button');
  btns.forEach(b => b.classList.remove('active'));
  listEl.style.display = 'none';
  graphEl.style.display = 'none';
  if (outputsEl) outputsEl.style.display = 'none';
  if (view === 'graph') {
    graphEl.style.display = 'block';
    btns[1].classList.add('active');
    const wrap = graphEl.querySelector('.depgraph-wrap');
    if (wrap && wrap.dataset.projId) initGraphInteraction(wrap.dataset.projId);
  } else if (view === 'outputs') {
    if (outputsEl) outputsEl.style.display = 'block';
    btns[2].classList.add('active');
  } else {
    listEl.style.display = 'block';
    btns[0].classList.add('active');
  }
}

// ---------- Output(s) View ----------

let allOutputs = {};

async function loadOutputs() {
  try {
    const resp = await fetch('data/outputs.json?_=' + Date.now());
    if (resp.ok) allOutputs = await resp.json();
  } catch (e) { console.warn('Could not load outputs.json:', e); }
}

function renderOutputsView(project) {
  const slug = project.slug;
  const data = allOutputs[slug];
  const esc = s => String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const isAllProjects = currentFilter === '__all__';

  let html = '';

  // Hero card: description + run button
  html += `<div class="outputs-hero">`;
  html += `<div class="outputs-hero-text">`;
  html += `<h3>${esc(project.name)}</h3>`;
  if (data && data.description) {
    html += `<p>${esc(data.description)}</p>`;
  } else {
    // Fallback: auto-generate from task completion
    const done = (project.tasks || []).filter(t => t.status === 'completed').length;
    const total = (project.tasks || []).length;
    html += `<p>${done}/${total} tasks completed. Output details coming soon.</p>`;
  }
  if (!isAllProjects) {
    html += `<div style="display:flex; align-items:center; flex-wrap:wrap; gap:8px;">`;
    if (data && data.runCommand) {
      html += `<button class="outputs-run-btn" onclick="runProject('${esc(slug)}')" title="${esc(data.runCommand)}">▶ Run Application</button>`;
    }
    if (data && data.repoUrl) {
      html += `<a href="${esc(data.repoUrl)}" target="_blank" class="outputs-repo-link">📂 View Repository</a>`;
    }
    html += `</div>`;
  } else {
    // All Projects mode: just show repo link, no run button
    if (data && data.repoUrl) {
      html += `<a href="${esc(data.repoUrl)}" target="_blank" class="outputs-repo-link" style="margin-top:4px;">📂 View Repository</a>`;
    }
  }
  html += `</div>`; // end outputs-hero-text
  html += `</div>`; // end outputs-hero

  // Gallery
  const gallery = (data && data.gallery) ? data.gallery.filter(g => g.image || g.caption) : [];
  html += `<div class="outputs-gallery-title">📸 Showcase ${gallery.length ? `(${gallery.length})` : ''}</div>`;
  if (gallery.length) {
    html += `<div class="outputs-gallery">`;
    for (const item of gallery) {
      html += `<div class="gallery-card">`;
      if (item.image) {
        html += `<img src="${esc(item.image)}" alt="${esc(item.caption || 'Screenshot')}" loading="lazy" onerror="this.style.display='none'">`;
      }
      if (item.caption) {
        html += `<div class="caption">${esc(item.caption)}`;
        if (item.date) html += `<div class="caption-date">${esc(item.date)}</div>`;
        html += `</div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  } else {
    html += `<div class="gallery-empty">No screenshots yet — add images to <code>data/outputs.json</code></div>`;
  }

  return html;
}

function runProject(slug) {
  const data = allOutputs[slug];
  if (!data || !data.runCommand) return;
  // Copy command to clipboard and show confirmation
  navigator.clipboard.writeText(data.runCommand).then(() => {
    const btn = event.target.closest('.outputs-run-btn');
    if (btn) {
      const orig = btn.innerHTML;
      btn.innerHTML = '✅ Command copied!';
      btn.style.background = 'linear-gradient(135deg, #00b4d8, #7b61ff)';
      setTimeout(() => { btn.innerHTML = orig; btn.style.background = ''; }, 2000);
    }
  }).catch(() => {
    prompt('Run this command to start the application:', data.runCommand);
  });
}

// ---------- Dependency Graph (Phased Container Layout) ----------
//
// Layout strategy: phases are placed on a 2-D grid; tasks are laid out
// INSIDE each phase container in a small grid (<gridCols> per row).
// Gate tasks (Integration / Phase Gate / explicit IDs) render as wider
// purple pill nodes. Cross-phase dependencies draw curved bezier lines.
//
// Layout config (rows of phases). Each entry: array of { phase, cols, weight }.
//   cols   = tasks per row inside the phase container
//   weight = relative horizontal weight in its row (1 = single column unit)
const GATE_TASK_IDS = new Set(['task-09','task-19','task-25','task-29','task-35','task-38']);

function isGateTask(t) {
  if (GATE_TASK_IDS.has(t.id)) return true;
  const n = (t.name || '').toLowerCase();
  if (n.includes('integration')) return true;
  if (n.includes('phase') && n.includes('gate')) return true;
  return false;
}

function depGraphLayoutPlan(phaseOrder) {
  // Default plan: Phase 1 spans full width; phases 2/3/4 side-by-side;
  // phase 5 centered; phase 6 wide; phase 7 centered.
  // We key by phase id when possible, else by index.
  const byId = {
    'phase-1': { row: 0, weight: 3, cols: 3 },
    'phase-2': { row: 1, weight: 1, cols: 2 },
    'phase-3': { row: 1, weight: 1, cols: 2 },
    'phase-4': { row: 1, weight: 1, cols: 2 },
    'phase-5': { row: 2, weight: 2, cols: 3 },
    'phase-6': { row: 3, weight: 3, cols: 3 },
    'phase-7': { row: 4, weight: 2, cols: 3 }
  };
  return phaseOrder.map((p, i) => {
    if (byId[p]) return { phase: p, ...byId[p] };
    // Fallback: stack each phase on its own row
    return { phase: p, row: i, weight: 1, cols: 3 };
  });
}

function renderDepGraph(project, phaseNames) {
  const tasks = project.tasks || [];
  if (!tasks.length) return '<div class="empty-state">No tasks</div>';

  // ---- Group tasks by phase (preserve project.phases order if available)
  const phaseOrder = [];
  const phaseMap = {};
  if (project.phases && project.phases.length) {
    for (const p of project.phases) {
      phaseOrder.push(p.id);
      phaseMap[p.id] = [];
    }
  }
  for (const t of tasks) {
    const p = t.phase || 'ungrouped';
    if (!phaseMap[p]) { phaseMap[p] = []; phaseOrder.push(p); }
    phaseMap[p].push(t);
  }

  // ---- Geometry constants (SVG user units)
  const TASK_W = 150, TASK_H = 54;
  const GATE_W = 200, GATE_H = 38;
  const TASK_GAP_X = 18, TASK_GAP_Y = 14;
  const PHASE_PAD_X = 18, PHASE_PAD_TOP = 38, PHASE_PAD_BOTTOM = 18;
  const PHASE_GAP_X = 36, PHASE_GAP_Y = 56;
  const OUTER_PAD = 20;

  // ---- Build layout plan
  const plan = depGraphLayoutPlan(phaseOrder);
  // Group plan entries by row
  const rowsMap = {};
  for (const entry of plan) {
    if (!rowsMap[entry.row]) rowsMap[entry.row] = [];
    rowsMap[entry.row].push(entry);
  }
  const rowKeys = Object.keys(rowsMap).map(Number).sort((a,b)=>a-b);

  // ---- Compute size of each phase container based on its task count
  function phaseInnerSize(entry) {
    const ts = phaseMap[entry.phase] || [];
    const cols = Math.max(1, entry.cols);
    const rows = Math.max(1, Math.ceil(ts.length / cols));
    // Width based on max possible task width (use TASK_W; gates are wider but we let them extend slightly,
    // or use gate width if any gate is present and only 1 col).
    const hasGate = ts.some(isGateTask);
    const cellW = hasGate && cols === 1 ? GATE_W : TASK_W;
    const innerW = cols * cellW + (cols - 1) * TASK_GAP_X;
    const innerH = rows * TASK_H + (rows - 1) * TASK_GAP_Y;
    return {
      w: innerW + PHASE_PAD_X * 2,
      h: innerH + PHASE_PAD_TOP + PHASE_PAD_BOTTOM,
      cols, rows, cellW, innerW, innerH
    };
  }

  // First pass: per-phase intrinsic size
  const phaseSize = {};
  for (const entry of plan) phaseSize[entry.phase] = phaseInnerSize(entry);

  // ---- Compute row widths (total weight × unit), find layout width
  // For each row, expand each phase to fill its weight share of row width.
  // We pick a row "target width" = max(natural sum, widest single row).
  const rowNaturalWidths = rowKeys.map(rk => {
    const entries = rowsMap[rk];
    let sum = 0;
    for (const e of entries) sum += phaseSize[e.phase].w;
    sum += (entries.length - 1) * PHASE_GAP_X;
    return sum;
  });
  const targetRowWidth = Math.max(...rowNaturalWidths);

  // For each row, distribute extra width by weight (so wide phases stretch).
  const rowPlans = rowKeys.map((rk, idx) => {
    const entries = rowsMap[rk];
    const natural = rowNaturalWidths[idx];
    const extra = Math.max(0, targetRowWidth - natural);
    const totalWeight = entries.reduce((s,e)=>s+e.weight, 0);
    const widths = entries.map(e => phaseSize[e.phase].w + (extra * (e.weight / totalWeight)));
    // Row height = tallest phase in this row
    const rowH = Math.max(...entries.map(e => phaseSize[e.phase].h));
    return { rk, entries, widths, rowH };
  });

  const svgW = targetRowWidth + OUTER_PAD * 2;
  let cursorY = OUTER_PAD;
  const phasePos = {}; // phase id -> { x, y, w, h }
  for (const rp of rowPlans) {
    let cursorX = OUTER_PAD;
    rp.entries.forEach((entry, i) => {
      const w = rp.widths[i];
      const h = phaseSize[entry.phase].h;
      // Vertically center the phase rect within the row band
      const y = cursorY + (rp.rowH - h) / 2;
      phasePos[entry.phase] = { x: cursorX, y, w, h, entry, size: phaseSize[entry.phase] };
      cursorX += w + PHASE_GAP_X;
    });
    cursorY += rp.rowH + PHASE_GAP_Y;
  }
  const svgH = cursorY - PHASE_GAP_Y + OUTER_PAD;

  // ---- Compute task node positions inside each phase
  const taskPos = {}; // task id -> { x, y, w, h, isGate, task }
  for (const entry of plan) {
    const pp = phasePos[entry.phase];
    if (!pp) continue;
    const ts = phaseMap[entry.phase] || [];
    const { cols, cellW } = pp.size;
    // Center the inner grid horizontally within the (possibly widened) phase box
    const innerW = cols * cellW + (cols - 1) * TASK_GAP_X;
    const startX = pp.x + (pp.w - innerW) / 2;
    const startY = pp.y + PHASE_PAD_TOP;
    ts.forEach((t, idx) => {
      const c = idx % cols;
      const r = Math.floor(idx / cols);
      const gate = isGateTask(t);
      // Gate nodes: still placed on the same grid but rendered as pills.
      // Center the gate inside its cell.
      const cx = startX + c * (cellW + TASK_GAP_X);
      const cy = startY + r * (TASK_H + TASK_GAP_Y);
      const w = gate ? Math.min(GATE_W, cellW + 30) : TASK_W;
      const h = gate ? GATE_H : TASK_H;
      const x = cx + (cellW - w) / 2;
      const y = cy + (TASK_H - h) / 2;
      taskPos[t.id] = { x, y, w, h, isGate: gate, task: t };
    });
  }

  // ---- Helpers for SVG escaping
  const esc = s => String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  const truncate = (s, n) => {
    s = String(s || '');
    return s.length > n ? s.slice(0, n - 1) + '…' : s;
  };

  // ---- Build SVG: phase containers first (so they sit behind nodes)
  let svgPhases = '';
  for (const entry of plan) {
    const pp = phasePos[entry.phase];
    if (!pp) continue;
    const ts = phaseMap[entry.phase] || [];
    const done = ts.filter(t => t.status === 'completed').length;
    const label = phaseNames[entry.phase] ? `${entry.phase.replace('phase-','Phase ')} — ${phaseNames[entry.phase]}` : entry.phase;
    svgPhases += `<rect class="phase-rect" x="${pp.x}" y="${pp.y}" width="${pp.w}" height="${pp.h}" rx="12"/>`;
    svgPhases += `<text class="phase-title" x="${pp.x + PHASE_PAD_X}" y="${pp.y + 22}">${esc(label)}</text>`;
    svgPhases += `<text class="phase-count" x="${pp.x + pp.w - PHASE_PAD_X}" y="${pp.y + 22}" text-anchor="end">${done}/${ts.length} done</text>`;
  }

  // ---- Dependency lines (curved bezier)
  let svgLines = '';
  for (const t of tasks) {
    const deps = t.depends_on || [];
    if (!deps.length) continue;
    const to = taskPos[t.id];
    if (!to) continue;
    for (const depId of deps) {
      const from = taskPos[depId];
      if (!from) continue;
      const samePhase = from.task.phase === to.task.phase;
      // Determine connection points based on relative position
      const fromCenterX = from.x + from.w / 2;
      const fromCenterY = from.y + from.h / 2;
      const toCenterX = to.x + to.w / 2;
      const toCenterY = to.y + to.h / 2;
      const dx = toCenterX - fromCenterX;
      const dy = toCenterY - fromCenterY;
      let sx, sy, tx, ty, cx1, cy1, cx2, cy2;
      if (Math.abs(dy) > Math.abs(dx)) {
        // Predominantly vertical: bottom of source -> top of target
        sx = fromCenterX; sy = from.y + from.h;
        tx = toCenterX;   ty = to.y;
        const midY = sy + (ty - sy) * 0.5;
        cx1 = sx; cy1 = midY;
        cx2 = tx; cy2 = midY;
      } else {
        // Predominantly horizontal: right -> left (or reverse)
        if (dx >= 0) {
          sx = from.x + from.w; sy = fromCenterY;
          tx = to.x;            ty = toCenterY;
        } else {
          sx = from.x; sy = fromCenterY;
          tx = to.x + to.w; ty = toCenterY;
        }
        const midX = sx + (tx - sx) * 0.5;
        cx1 = midX; cy1 = sy;
        cx2 = midX; cy2 = ty;
      }
      const cls = 'dep-line' +
        (samePhase ? '' : ' cross-phase') +
        (from.task.status === 'completed' ? ' completed' : '');
      svgLines += `<path class="${cls}" d="M${sx.toFixed(1)},${sy.toFixed(1)} C${cx1.toFixed(1)},${cy1.toFixed(1)} ${cx2.toFixed(1)},${cy2.toFixed(1)} ${tx.toFixed(1)},${ty.toFixed(1)}"/>`;
    }
  }

  // ---- Task nodes
  let svgNodes = '';
  for (const t of tasks) {
    const p = taskPos[t.id];
    if (!p) continue;
    const status = t.status || 'pending';
    const icon = STATUS_ICONS[status] || '·';
    const rectExtra = landedClass(t); // ' not-landed' for completed-but-unmerged
    const iconColor = (status === 'completed' && t.landed === false) ? '#d29922' : statusIconColor(status);
    const timeAgo = t.lastActivity ? formatTimeAgo(t.lastActivity) : '';

    if (p.isGate) {
      // Gate pill node
      const label = truncate(t.name, 26);
      const rx = p.h / 2;
      svgNodes += `<g class="task-node" onclick="toggleTaskInfo('${esc(project.slug)}','${esc(t.id)}')">`;
      svgNodes += `<rect class="gate-rect ${status}" x="${p.x}" y="${p.y}" width="${p.w}" height="${p.h}" rx="${rx}" ry="${rx}"/>`;
      svgNodes += `<text class="task-id-text" x="${p.x + 12}" y="${p.y + p.h/2 + 4}">${esc(t.id.replace('task-','T'))}</text>`;
      svgNodes += `<text class="gate-label" x="${p.x + p.w/2}" y="${p.y + p.h/2 + 4}" text-anchor="middle">◆ ${esc(label)}</text>`;
      // Info button
      svgNodes += renderInfoBtn(p.x + p.w - 14, p.y + p.h/2, project.slug, t.id);
      svgNodes += `</g>`;
    } else {
      // Regular task node
      const name = truncate(t.name, 22);
      svgNodes += `<g class="task-node" onclick="toggleTaskInfo('${esc(project.slug)}','${esc(t.id)}')">`;
      svgNodes += `<rect class="task-rect ${status}${rectExtra}" x="${p.x}" y="${p.y}" width="${p.w}" height="${p.h}" rx="8"/>`;
      // Top row: task id (left) + status icon (right)
      svgNodes += `<text class="task-id-text" x="${p.x + 10}" y="${p.y + 14}">${esc(t.id.replace('task-','T'))}</text>`;
      svgNodes += `<text class="task-id-text" x="${p.x + p.w - 22}" y="${p.y + 14}" text-anchor="end" style="font-size:11px;fill:${iconColor}">${esc(icon)}</text>`;
      // Task name (middle)
      svgNodes += `<text class="task-name-text" x="${p.x + 10}" y="${p.y + 30}">${esc(name)}</text>`;
      // Time ago (bottom-left)
      if (timeAgo) {
        svgNodes += `<text class="task-time-text" x="${p.x + 10}" y="${p.y + p.h - 8}">${esc(timeAgo)}</text>`;
      }
      // Info button (bottom-right)
      svgNodes += renderInfoBtn(p.x + p.w - 12, p.y + p.h - 11, project.slug, t.id);
      svgNodes += `</g>`;
    }
  }

  // ---- Legend (HTML, above the SVG)
  const legendHtml = `
    <div class="depgraph-legend">
      <span class="lg-item"><span class="lg-swatch completed"></span>complete + landed</span>
      <span class="lg-item"><span class="lg-swatch not-landed"></span>complete (not merged)</span>
      <span class="lg-item"><span class="lg-swatch running"></span>running</span>
      <span class="lg-item"><span class="lg-swatch failed"></span>failed</span>
      <span class="lg-item"><span class="lg-swatch pending"></span>pending</span>
      <span class="lg-item"><span class="lg-swatch skipped"></span>skipped</span>
      <span class="lg-item"><span class="lg-swatch gate"></span>gate / milestone</span>
      <span class="lg-item" style="margin-left:auto;font-style:italic">click ⓘ on any task for details</span>
    </div>`;

  const projId = (project.slug || 'p').replace(/[^a-z0-9]/g, '_');

  // Phase filter options
  let phaseFilterOpts = '<option value="__all__">All Phases</option>';
  for (const pid of phaseOrder) {
    const label = phaseNames[pid] ? `${pid.replace('phase-','P')} — ${phaseNames[pid]}` : pid;
    phaseFilterOpts += `<option value="${esc(pid)}">${esc(label)}</option>`;
  }

  return `
    ${legendHtml}
    <div class="depgraph-toolbar">
      <select onchange="filterGraphPhase('${esc(projId)}', this.value)">${phaseFilterOpts}</select>
      <button class="graph-btn" id="zoom-btn-${projId}" onclick="resetGraphZoom('${esc(projId)}')">⟲ Reset Zoom</button>
    </div>
    <div id="depgraph-info-${projId}"></div>
    <div class="depgraph-wrap" id="depgraph-wrap-${projId}" data-proj-id="${esc(projId)}">
      <svg class="depgraph-svg" id="depgraph-svg-${projId}" viewBox="0 0 ${svgW} ${svgH}" preserveAspectRatio="xMidYMin meet" xmlns="http://www.w3.org/2000/svg">
        ${svgPhases}
        ${svgLines}
        ${svgNodes}
      </svg>
    </div>
    <div class="graph-hint">pinch or scroll-wheel to zoom · drag to pan · click ⓘ for details</div>
  `;
}

function renderInfoBtn(cx, cy, slug, taskId) {
  const esc = s => String(s).replace(/'/g,"\\'");
  return `<g class="info-btn" onclick="event.stopPropagation(); toggleTaskInfo('${esc(slug)}','${esc(taskId)}')">` +
    `<circle cx="${cx}" cy="${cy}" r="7"/>` +
    `<text x="${cx}" y="${cy + 3}" text-anchor="middle">i</text>` +
    `</g>`;
}

function statusIconColor(status) {
  switch (status) {
    case 'completed':   return '#3fb950';
    case 'running':     return '#58a6ff';
    case 'in_progress': return '#58a6ff';
    case 'failed':      return '#f85149';
    case 'skipped':   return '#d29922';
    default:          return '#8b949e';
  }
}

// ---- Info-panel toggle (called from inline onclick on task nodes)
function toggleTaskInfo(slug, taskId) {
  showTaskDetail(slug, taskId);
  return;
  // Legacy inline panel code below (kept for reference)
  const projId = (slug || 'p').replace(/[^a-z0-9]/g, '_');
  const host = document.getElementById('depgraph-info-' + projId);
  if (!host) return;
  if (host.dataset.openTask === taskId) {
    host.innerHTML = '';
    host.dataset.openTask = '';
    return;
  }
  const project = allProjects[slug];
  if (!project) return;
  const task = (project.tasks || []).find(t => t.id === taskId);
  if (!task) return;
  const esc = s => String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const deps = (task.depends_on && task.depends_on.length) ? task.depends_on.join(', ') : '<em>none</em>';
  const timeAgo = task.lastActivity ? formatTimeAgo(task.lastActivity) : '—';
  const ts = task.lastActivity ? new Date(task.lastActivity).toLocaleString() : '';
  const status = task.status || 'pending';
  const doneWhen = task.doneWhen ? esc(task.doneWhen) : '<em>(no description)</em>';
  host.dataset.openTask = taskId;
  host.innerHTML = `
    <div class="depgraph-info-panel">
      <div class="ip-header">
        <div>
          <span class="ip-id">${esc(task.id)}</span>
          <span class="ip-title">${esc(task.name)}</span>
        </div>
        <button class="ip-close" onclick="closeTaskInfo('${esc(slug)}')" title="Close">×</button>
      </div>
      <div class="ip-row"><strong>Status:</strong><span class="ip-status ${status}${landedClass(task)}">${esc(status === 'completed' ? (task.landed === false ? 'complete (not merged)' : 'complete + landed') : status)}</span></div>
      <div class="ip-row"><strong>Description:</strong>${doneWhen}</div>
      <div class="ip-row"><strong>Dependencies:</strong>${deps}</div>
      ${task.startedAt ? `<div class="ip-row"><strong>Started:</strong>${esc(new Date(task.startedAt).toLocaleString())}</div>` : ''}
      ${task.finishedAt ? `<div class="ip-row"><strong>Finished:</strong>${esc(new Date(task.finishedAt).toLocaleString())}</div>` : ''}
      ${(task.durationSeconds || (task.status === 'in_progress' && task.startedAt)) ? `<div class="ip-row"><strong>Total time:</strong>${task.durationSeconds ? esc(formatDuration(task.durationSeconds)) : esc(formatDuration(Math.max(0, Math.floor((Date.now() - new Date(task.startedAt).getTime())/1000)))) + ' (running)'}</div>` : ''}
      <div class="ip-row"><strong>Last activity:</strong>${esc(timeAgo)}${ts ? ' · <span style="color:var(--text-muted)">' + esc(ts) + '</span>' : ''}</div>
      ${task.costUSD ? `<div class="ip-row"><strong>Cost:</strong><span style="color:var(--accent);font-weight:600">$${task.costUSD.toFixed(2)}</span> · ${task.numTurns || 0} turns · ${formatDuration(task.durationSeconds || 0)} · <span style="color:var(--text-muted)">${formatTokens((task.inputTokens||0)+(task.outputTokens||0)+(task.cacheReadTokens||0))} tokens</span></div>` : ''}
    </div>`;
  // Scroll the panel into view if it's offscreen
  host.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeTaskInfo(slug) {
  const projId = (slug || 'p').replace(/[^a-z0-9]/g, '_');
  const host = document.getElementById('depgraph-info-' + projId);
  if (!host) return;
  host.innerHTML = '';
  host.dataset.openTask = '';
}

// ---- Graph pan/zoom state per project ----
const _graphZoom = {}; // projId -> { scale, panX, panY }

function getZoomState(projId) {
  if (!_graphZoom[projId]) _graphZoom[projId] = { scale: 1, panX: 0, panY: 0 };
  return _graphZoom[projId];
}

function applyTransform(projId) {
  const svg = document.getElementById('depgraph-svg-' + projId);
  if (!svg) return;
  const z = getZoomState(projId);
  svg.style.transform = `translate(${z.panX}px, ${z.panY}px) scale(${z.scale})`;
}

function clampPan(projId) {
  const wrap = document.getElementById('depgraph-wrap-' + projId);
  const svg = document.getElementById('depgraph-svg-' + projId);
  if (!wrap || !svg) return;
  const z = getZoomState(projId);
  const wrapR = wrap.getBoundingClientRect();
  const svgW = svg.getBoundingClientRect().width / z.scale * z.scale;
  const svgH = svg.getBoundingClientRect().height / z.scale * z.scale;
  // At scale 1 the SVG fills the container width; panning should not
  // leave blank space beyond edges
  const baseW = wrapR.width - 32; // account for padding
  const baseH = svg.clientHeight;
  const scaledW = baseW * z.scale;
  const scaledH = baseH * z.scale;
  const maxPanX = 0;
  const minPanX = Math.min(0, baseW - scaledW);
  const maxPanY = 0;
  const minPanY = Math.min(0, wrapR.height - 32 - scaledH);
  z.panX = Math.max(minPanX, Math.min(maxPanX, z.panX));
  z.panY = Math.max(minPanY, Math.min(maxPanY, z.panY));
}

function resetGraphZoom(projId) {
  const z = getZoomState(projId);
  z.scale = 1; z.panX = 0; z.panY = 0;
  applyTransform(projId);
}

// Attach pointer/wheel listeners to graph containers (called after render)
function initGraphInteraction(projId) {
  const wrap = document.getElementById('depgraph-wrap-' + projId);
  if (!wrap || wrap.dataset.zoomInit) return;
  wrap.dataset.zoomInit = '1';

  // --- Wheel zoom ---
  wrap.addEventListener('wheel', function(e) {
    e.preventDefault();
    const z = getZoomState(projId);
    const rect = wrap.getBoundingClientRect();
    const ox = e.clientX - rect.left - 16; // offset within padding
    const oy = e.clientY - rect.top - 16;
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = Math.max(1, Math.min(8, z.scale * delta));
    // Zoom toward cursor
    const ratio = newScale / z.scale;
    z.panX = ox - ratio * (ox - z.panX);
    z.panY = oy - ratio * (oy - z.panY);
    z.scale = newScale;
    clampPan(projId);
    applyTransform(projId);
  }, { passive: false });

  // --- Touch pinch + drag ---
  let pointers = [];
  let lastDist = 0;
  let lastMidX = 0, lastMidY = 0;
  let dragging = false;
  let dragStartX = 0, dragStartY = 0, dragPanX = 0, dragPanY = 0;

  wrap.addEventListener('pointerdown', function(e) {
    pointers = pointers.filter(p => p.id !== e.pointerId);
    pointers.push({ id: e.pointerId, x: e.clientX, y: e.clientY });
    if (pointers.length === 1) {
      dragging = true;
      const z = getZoomState(projId);
      dragStartX = e.clientX; dragStartY = e.clientY;
      dragPanX = z.panX; dragPanY = z.panY;
      wrap.setPointerCapture(e.pointerId);
    }
    if (pointers.length === 2) {
      dragging = false;
      lastDist = Math.hypot(pointers[1].x - pointers[0].x, pointers[1].y - pointers[0].y);
      lastMidX = (pointers[0].x + pointers[1].x) / 2;
      lastMidY = (pointers[0].y + pointers[1].y) / 2;
    }
  });

  wrap.addEventListener('pointermove', function(e) {
    const idx = pointers.findIndex(p => p.id === e.pointerId);
    if (idx < 0) return;
    pointers[idx] = { id: e.pointerId, x: e.clientX, y: e.clientY };

    if (pointers.length === 2) {
      // Pinch zoom
      const dist = Math.hypot(pointers[1].x - pointers[0].x, pointers[1].y - pointers[0].y);
      const midX = (pointers[0].x + pointers[1].x) / 2;
      const midY = (pointers[0].y + pointers[1].y) / 2;
      const z = getZoomState(projId);
      const rect = wrap.getBoundingClientRect();
      const ox = midX - rect.left - 16;
      const oy = midY - rect.top - 16;
      const ratio = dist / lastDist;
      const newScale = Math.max(1, Math.min(8, z.scale * ratio));
      const scaleRatio = newScale / z.scale;
      z.panX = ox - scaleRatio * (ox - z.panX) + (midX - lastMidX);
      z.panY = oy - scaleRatio * (oy - z.panY) + (midY - lastMidY);
      z.scale = newScale;
      lastDist = dist;
      lastMidX = midX; lastMidY = midY;
      clampPan(projId);
      applyTransform(projId);
    } else if (dragging && pointers.length === 1) {
      // Single-finger drag (pan) — only when zoomed in
      const z = getZoomState(projId);
      if (z.scale <= 1) return;
      z.panX = dragPanX + (e.clientX - dragStartX);
      z.panY = dragPanY + (e.clientY - dragStartY);
      clampPan(projId);
      applyTransform(projId);
    }
  });

  function onPointerUp(e) {
    pointers = pointers.filter(p => p.id !== e.pointerId);
    if (pointers.length < 2) { lastDist = 0; }
    if (pointers.length === 0) { dragging = false; }
  }
  wrap.addEventListener('pointerup', onPointerUp);
  wrap.addEventListener('pointercancel', onPointerUp);
}

// ---- Phase filter ----
function filterGraphPhase(projId, phaseId) {
  const slug = Object.keys(allProjects).find(s => s.replace(/[^a-z0-9]/g, '_') === projId);
  if (!slug || !allProjects[slug]) return;
  const project = allProjects[slug];
  const tasks = project.tasks || [];
  const phaseNames = {};
  if (project.phases) project.phases.forEach(p => phaseNames[p.id] = p.name);
  const graphDiv = document.getElementById('view-graph-' + projId);
  if (!graphDiv) return;

  let filteredProject = project;
  if (phaseId !== '__all__') {
    const filteredTasks = tasks.filter(t => t.phase === phaseId);
    const filteredPhases = (project.phases || []).filter(p => p.id === phaseId);
    filteredProject = { ...project, tasks: filteredTasks, phases: filteredPhases };
  }
  graphDiv.innerHTML = renderDepGraph(filteredProject, phaseNames);
  // Restore filter selection
  const select = graphDiv.querySelector('.depgraph-toolbar select');
  if (select) select.value = phaseId;
  // Reset zoom & re-init interaction
  delete _graphZoom[projId];
  initGraphInteraction(projId);
}

// ---- Task Detail Modal ----
// Simple markdown-to-HTML renderer for task descriptions
function renderMarkdown(md) {
  if (!md) return '';
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let html = '';
  const lines = md.split('\n');
  let inList = false;
  let inCode = false;
  let codeBlock = '';
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    // Fenced code blocks
    if (line.trim().startsWith('```')) {
      if (inCode) {
        html += `<pre style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;font-size:12px;overflow-x:auto;margin:6px 0;">${esc(codeBlock)}</pre>`;
        codeBlock = '';
      }
      inCode = !inCode;
      continue;
    }
    if (inCode) { codeBlock += (codeBlock ? '\n' : '') + line; continue; }
    // Headers
    const hMatch = line.match(/^(#{1,4})\s+(.+)/);
    if (hMatch) {
      if (inList) { html += '</ul>'; inList = false; }
      const level = Math.min(hMatch[1].length + 1, 6); // bump down since h1 is the task title
      html += `<h${level} style="margin:12px 0 4px;font-size:${18 - level * 2}px;color:var(--text);">${esc(hMatch[2])}</h${level}>`;
      continue;
    }
    // List items
    const liMatch = line.match(/^\s*[-*]\s+(.+)/);
    if (liMatch) {
      if (!inList) { html += '<ul style="margin:4px 0 4px 16px;padding:0;">'; inList = true; }
      let content = esc(liMatch[1]);
      // Bold
      content = content.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Inline code
      content = content.replace(/`([^`]+)`/g, '<code style="background:var(--bg);padding:1px 4px;border-radius:3px;font-size:12px;">$1</code>');
      html += `<li style="margin:2px 0;">${content}</li>`;
      continue;
    }
    // Close list if non-list line
    if (inList && line.trim() === '') { html += '</ul>'; inList = false; }
    // Empty lines
    if (line.trim() === '') { continue; }
    // Regular paragraph
    if (inList) { html += '</ul>'; inList = false; }
    let content = esc(line);
    content = content.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    content = content.replace(/`([^`]+)`/g, '<code style="background:var(--bg);padding:1px 4px;border-radius:3px;font-size:12px;">$1</code>');
    html += `<p style="margin:4px 0;line-height:1.5;">${content}</p>`;
  }
  if (inList) html += '</ul>';
  if (inCode) html += `<pre style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;font-size:12px;overflow-x:auto;margin:6px 0;">${esc(codeBlock)}</pre>`;
  return html;
}

function showTaskDetail(slug, taskId) {
  const overlay = document.getElementById('task-detail-overlay');
  if (!overlay) return;
  const project = allProjects[slug];
  if (!project) return;
  const tasks = project.tasks || [];
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;

  const esc = s => String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const status = task.status || 'pending';
  const statusLabel = status === 'completed'
    ? (task.landed === false ? 'Complete (not merged)' : 'Complete + landed')
    : status.charAt(0).toUpperCase() + status.slice(1);
  const icon = STATUS_ICONS[status] || '·';

  // Phase info
  const phaseNames = {};
  (project.phases || []).forEach(p => { phaseNames[p.id] = p.name; });
  const phaseName = phaseNames[task.phase] || task.phase || '—';
  const phaseLabel = task.phase ? `${task.phase.replace('phase-','Phase ')} — ${phaseName}` : '—';

  // Done When (short summary)
  const doneWhen = task.doneWhen || null;

  // Full description from prompt file
  const fullDesc = task.description || null;

  // Dependencies
  const deps = task.depends_on && task.depends_on.length ? task.depends_on : [];
  const depsHtml = deps.length
    ? deps.map(d => `<span class="td-dep-chip" onclick="event.stopPropagation(); showTaskDetail('${esc(slug)}','${esc(d)}')">${esc(d)}</span>`).join('')
    : '<span style="color:var(--text-muted)">None — no dependencies</span>';

  // Time
  const timeAgo = task.lastActivity ? formatTimeAgo(task.lastActivity) : '—';
  const timeAbs = task.lastActivity ? new Date(task.lastActivity).toLocaleString() : '';

  // Cost section
  let costHtml = '';
  if (task.costUSD) {
    const fmtDur = task.durationSeconds ? formatDuration(task.durationSeconds) : '—';
    const fmtTokens = (n) => { if (!n) return '0'; if (n >= 1000000) return (n/1000000).toFixed(1) + 'M'; if (n >= 1000) return (n/1000).toFixed(1) + 'K'; return n.toString(); };
    const costEst = !!task.costEstimated;
    const costPrefix = costEst ? '~' : '';
    const costLbl = costEst ? 'API Cost (estimated)' : 'API Cost (measured)';
    costHtml = `
      <div class="td-section">
        <div class="td-label">Performance${costEst ? ' <span style="color:var(--text-muted);font-weight:400">— estimated from duration × measured rate</span>' : ''}</div>
        <div class="td-cost-grid">
          <div class="td-cost-cell"><div class="num">${costPrefix}$${task.costUSD.toFixed(2)}</div><div class="lbl">${costLbl}</div></div>
          <div class="td-cost-cell"><div class="num">${task.numTurns || 0}</div><div class="lbl">Turns</div></div>
          <div class="td-cost-cell"><div class="num">${fmtDur}</div><div class="lbl">Duration</div></div>
          <div class="td-cost-cell"><div class="num">${fmtTokens((task.inputTokens||0)+(task.outputTokens||0))}</div><div class="lbl">Tokens (in+out)</div></div>
          <div class="td-cost-cell"><div class="num">${fmtTokens(task.cacheReadTokens||0)}</div><div class="lbl">Cache Read</div></div>
          <div class="td-cost-cell"><div class="num">${fmtTokens(task.cacheCreationTokens||0)}</div><div class="lbl">Cache Write</div></div>
        </div>
      </div>`;
  }

  // Prompt link (full instructions fed to the build agent)
  const promptLinkHtml = task.promptUrl
    ? `<div class="td-section"><div class="td-label">Build Prompt</div><div class="td-value"><a href="${esc(task.promptUrl)}" target="_blank" rel="noopener" style="color:var(--blue);">📄 View full prompt fed to the build agent →</a></div></div>`
    : '';

  // Summarized build instructions — a plain-language distillation of the actual
  // prompt fed to the AFDT build agent, so a viewer gets the gist without opening
  // the raw prompt file. Rendered as markdown (supports the ## Problem / ## Build
  // / ## Acceptance structure the extractor produces).
  const promptSummaryHtml = task.promptSummary
    ? `<div class="td-section">
        <div class="td-label">🧭 Build Instructions <span style="color:var(--text-muted);font-weight:400">(summary of what the agent was told)</span></div>
        <div class="td-value td-description">${renderMarkdown(task.promptSummary)}</div>
      </div>`
    : '';

  // Description section
  let descHtml = '';
  if (fullDesc) {
    descHtml = `
      <div class="td-section">
        <div class="td-label">Full Task Description</div>
        <div class="td-value td-description">${renderMarkdown(fullDesc)}</div>
      </div>`;
  } else if (doneWhen) {
    descHtml = `
      <div class="td-section">
        <div class="td-label">Done When</div>
        <div class="td-value">${esc(doneWhen)}</div>
      </div>`;
  }

  // Nav: prev/next task
  const taskIdx = tasks.findIndex(t => t.id === taskId);
  const prevTask = taskIdx > 0 ? tasks[taskIdx - 1] : null;
  const nextTask = taskIdx < tasks.length - 1 ? tasks[taskIdx + 1] : null;

  overlay.innerHTML = `
    <div class="task-detail-card">
      <div class="td-header">
        <div class="td-header-left">
          <div class="td-task-id">${esc(task.id)}</div>
          <div class="td-task-name">${icon} ${esc(task.name)}</div>
        </div>
        <button class="td-close" onclick="closeTaskDetail()" title="Close">&times;</button>
      </div>
      <div class="td-body">
        <div class="td-section">
          <div class="td-label">Status</div>
          <div class="td-value"><span class="td-status-badge ${status}${landedClass(task)}">${statusLabel}</span></div>
        </div>
        <div class="td-section">
          <div class="td-label">Phase</div>
          <div class="td-value">${esc(phaseLabel)}</div>
        </div>
        ${doneWhen ? `<div class="td-section"><div class="td-label">Done When</div><div class="td-value" style="font-style:italic;color:var(--text-muted);">${esc(doneWhen)}</div></div>` : ''}
        <div class="td-section">
          <div class="td-label">Dependencies</div>
          <div class="td-deps">${depsHtml}</div>
        </div>
        <div class="td-section">
          <div class="td-label">Last Activity</div>
          <div class="td-value">${esc(timeAgo)}${timeAbs ? ' · <span style="color:var(--text-muted)">' + esc(timeAbs) + '</span>' : ''}</div>
        </div>
        ${costHtml}
        ${promptSummaryHtml}
        ${descHtml}
        ${promptLinkHtml}
      </div>
      <div class="td-nav">
        <button class="td-nav-btn" ${prevTask ? `onclick="showTaskDetail('${esc(slug)}','${esc(prevTask.id)}')"` : 'disabled'}>${prevTask ? '← ' + esc(prevTask.id) : '← Prev'}</button>
        <button class="td-nav-btn" ${nextTask ? `onclick="showTaskDetail('${esc(slug)}','${esc(nextTask.id)}')"` : 'disabled'}>${nextTask ? esc(nextTask.id) + ' →' : 'Next →'}</button>
      </div>
    </div>`;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeTaskDetail() {
  const overlay = document.getElementById('task-detail-overlay');
  if (!overlay) return;
  overlay.classList.remove('open');
  overlay.innerHTML = '';
  document.body.style.overflow = '';
}

// Close on Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeTaskDetail();
});

// Initial load
loadAll();
