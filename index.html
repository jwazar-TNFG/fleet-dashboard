<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Force browsers to revalidate the HTML/JS on every load so shipped fixes
       take effect immediately (GitHub Pages otherwise lets clients cache the
       page for up to 10 min, which stranded users on old broken JS). -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>AI Fleet Dev Team — Dashboard</title>
  <script>
    // BUILD_VERSION is bumped on every deploy (version.json). If a client is
    // running a stale cached page, a periodic check notices the server has a
    // newer version and force-reloads once with a cache-busting query — this
    // defeats GitHub Pages' 10-min HTML caching that keeps users on old JS.
    window.BUILD_VERSION = '20260724-011001';
    (function versionWatch(){
      async function check(){
        try{
          const r = await fetch('version.json?t=' + Date.now(), {cache:'no-store'});
          if(!r.ok) return;
          const {version} = await r.json();
          if(version && window.BUILD_VERSION && version !== window.BUILD_VERSION
             && window.BUILD_VERSION !== '20260719-165722'){
            // new deploy detected — hard reload with cache-buster, once
            location.replace(location.pathname + '?v=' + version);
          }
        }catch(e){/* offline / ignore */}
      }
      check();
      setInterval(check, 60000); // re-check every 60s
    })();
  </script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-hover: #1c2129;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --blue: #58a6ff;
      --purple: #bc8cff;
      --orange: #f0883e;
      --cyan: #39d2c0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 .icon { font-size: 22px; }
    .header h1 .logo { width: 28px; height: 28px; border-radius: 6px; vertical-align: middle; margin-right: 2px; }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 14px;
      cursor: pointer;
      min-width: 180px;
    }

    select:focus { outline: 2px solid var(--accent); border-color: transparent; }

    .refresh-btn {
      background: var(--bg);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .refresh-btn:hover { color: var(--text); border-color: var(--accent); }
    .refresh-btn.spinning .icon { animation: spin 1s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Main content */
    .main { padding: 16px 20px; max-width: 900px; margin: 0 auto; }

    /* Overview cards */
    .overview {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
    }

    .stat-card .label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .stat-card.completed .value { color: var(--green); }
    .stat-card.running .value { color: var(--blue); }
    .stat-card.failed .value { color: var(--red); }
    .stat-card.pending .value { color: var(--text-muted); }

    /* Cost summary bar */
    .cost-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 12px;
      background: rgba(88,166,255,0.06);
      border: 1px solid rgba(88,166,255,0.15);
      border-radius: 8px;
      padding: 8px 14px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .cost-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .cost-label {
      color: var(--text-muted);
    }
    .cost-value {
      color: var(--accent);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .cost-footer {
      width: 100%;
      border-top: 1px solid rgba(88,166,255,0.12);
      margin-top: 4px;
      padding-top: 6px;
      font-size: 11px;
      line-height: 1.5;
      color: var(--text-muted);
    }
    .cost-footnote {
      font-size: 10px;
      opacity: 0.7;
    }

    /* Progress bar */
    .progress-container {
      margin-bottom: 20px;
    }

    .progress-bar-bg {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      height: 32px;
      overflow: hidden;
      display: flex;
    }

    .progress-segment {
      height: 100%;
      transition: width 0.5s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      min-width: 0;
    }

    .progress-segment.completed { background: var(--green); color: #000; }
    .progress-segment.running { background: var(--blue); color: #000; animation: pulse 2s ease-in-out infinite; }
    .progress-segment.failed { background: var(--red); color: #fff; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* System status banner */
    .system-status {
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
    }

    .system-status.running {
      background: rgba(59, 185, 80, 0.1);
      border: 1px solid rgba(59, 185, 80, 0.3);
      color: var(--green);
    }

    .system-status.stopped {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.3);
      color: var(--red);
    }

    .system-status.idle {
      background: rgba(139, 148, 158, 0.1);
      border: 1px solid rgba(139, 148, 158, 0.3);
      color: var(--text-muted);
    }

    .system-status.complete {
      background: rgba(59, 185, 80, 0.1);
      border: 1px solid rgba(59, 185, 80, 0.3);
      color: var(--green);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .system-status.running .status-dot { background: var(--green); animation: blink 1.5s ease-in-out infinite; }
    .system-status.stopped .status-dot { background: var(--red); }
    .system-status.idle .status-dot { background: var(--text-muted); }
    .system-status.complete .status-dot { background: var(--green); }

    @keyframes blink { 50% { opacity: 0.3; } }

    /* Phase sections */
    .phase {
      margin-bottom: 16px;
    }

    .phase-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      user-select: none;
    }

    .phase-header:hover { background: var(--surface-hover); }

    .phase-header h3 {
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .phase-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }

    .phase-badge.all-done { background: rgba(59, 185, 80, 0.15); color: var(--green); }
    .phase-badge.in-progress { background: rgba(88, 166, 255, 0.15); color: var(--blue); }
    .phase-badge.not-started { background: rgba(139, 148, 158, 0.1); color: var(--text-muted); }
    .phase-badge.has-failures { background: rgba(248, 81, 73, 0.15); color: var(--red); }

    .phase-chevron {
      transition: transform 0.2s;
      color: var(--text-muted);
    }

    .phase.collapsed .phase-chevron { transform: rotate(-90deg); }
    .phase.collapsed .task-list { display: none; }

    /* Task list */
    .task-list {
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 8px 8px;
      overflow: hidden;
    }

    /* Two-line task card: line 1 = icon + id + name (name gets full width),
       line 2 = muted metadata (started · duration · ago · deps). */
    .task-row {
      display: flex;
      align-items: flex-start;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .task-row:hover { background: var(--surface-hover); }

    .task-row:last-child { border-bottom: none; }

    .task-status-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .task-status-icon.completed { background: var(--green); color: #000; }
    /* Completed by the pipeline but the PR has not merged to main yet. */
    .task-status-icon.completed.not-landed { background: var(--yellow); color: #000; }
    .task-status-icon.running,
    .task-status-icon.in_progress { background: var(--blue); color: #fff; box-shadow: 0 0 0 3px rgba(88,166,255,0.28); animation: pulse 1.6s ease-in-out infinite; }
    .task-status-icon.running > .spin-glyph,
    .task-status-icon.in_progress > .spin-glyph { display: inline-block; animation: spin 1.1s linear infinite; }
    .task-status-icon.failed { background: var(--red); color: #fff; }
    .task-status-icon.pending { background: var(--border); color: var(--text-muted); }
    .task-status-icon.skipped { background: var(--yellow); color: #000; }

    /* Stacked content column */
    .task-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
    .task-line1 { display: flex; align-items: baseline; gap: 8px; min-width: 0; }

    .task-id {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .task-name {
      flex: 1;
      min-width: 0;
      line-height: 1.3;
      word-break: normal;
      overflow-wrap: break-word;
    }

    /* Metadata line under the title */
    .task-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.2;
    }
    .task-meta .sep { opacity: 0.4; }

    .task-cost {
      color: var(--accent);
      font-weight: 600;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .task-time { white-space: nowrap; }
    .task-timing { white-space: nowrap; font-variant-numeric: tabular-nums; }

    .task-deps {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      opacity: 0.85;
    }

    @media (min-width: 600px) {
      .task-deps { display: block; }
    }

    /* Empty / loading states */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 14px; }

    .loading { text-align: center; padding: 40px; color: var(--text-muted); }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 11px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    .last-updated {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* No-project state */
    .no-projects {
      text-align: center;
      padding: 80px 20px;
    }

    .no-projects .icon { font-size: 64px; margin-bottom: 16px; }

    /* View toggle tabs */
    .view-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
      border-bottom: 2px solid var(--border);
      width: 100%;
    }
    .view-toggle button {
      background: transparent;
      color: var(--text-muted);
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 44px;
    }
    .view-toggle button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }
    .view-toggle button:hover:not(.active) { color: var(--text); border-bottom-color: var(--text-muted); }

    /* ---- Output(s) Tab ---- */
    .outputs-view { padding: 0; }
    .outputs-hero {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .outputs-hero-text { flex: 1; }
    .outputs-hero-text h3 { margin: 0 0 8px; font-size: 18px; color: var(--text); }
    .outputs-hero-text p { margin: 0 0 16px; font-size: 14px; line-height: 1.6; color: var(--text-muted); }
    .outputs-run-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #00e5a0, #00b4d8);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 12px rgba(0, 229, 160, 0.3);
      text-decoration: none;
    }
    .outputs-run-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0, 229, 160, 0.45); }
    .outputs-run-btn:active { transform: translateY(0); }
    .outputs-repo-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: 12px;
      padding: 10px 20px;
      background: var(--surface-hover);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s;
    }
    .outputs-repo-link:hover { background: var(--border); }
    .outputs-gallery-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin: 24px 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .outputs-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .gallery-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
    }
    .gallery-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .gallery-card img {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      background: #111;
      display: block;
    }
    .gallery-card .caption {
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .gallery-card .caption-date {
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.6;
      margin-top: 4px;
    }
    .gallery-empty {
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
      font-style: italic;
      border: 1px dashed var(--border);
      border-radius: 10px;
    }

    /* Graph container */
    .graph-container {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 16px;
      margin-bottom: 16px;
    }
    .graph-container svg text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .graph-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }
    @keyframes nodePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

    /* ---------- Dependency Graph (Phased) ---------- */
    .depgraph-wrap {
      position: relative;
      overflow: hidden;
      touch-action: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      padding: 16px;
      margin-bottom: 12px;
      cursor: grab;
    }
    .depgraph-wrap:active { cursor: grabbing; }
    .depgraph-svg {
      display: block;
      width: 100%;
      height: auto;
      transform-origin: 0 0;
    }
    .depgraph-svg .phase-rect {
      fill: rgba(22, 27, 34, 0.8);
      stroke: var(--border);
      stroke-width: 1;
      rx: 12;
    }
    .depgraph-svg .phase-title {
      fill: var(--text);
      font-size: 13px;
      font-weight: 600;
    }
    .depgraph-svg .phase-count {
      fill: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
    }
    .depgraph-svg .dep-line {
      fill: none;
      stroke: #6e7681;
      stroke-width: 1.25;
      opacity: 0.55;
    }
    .depgraph-svg .dep-line.cross-phase {
      stroke: #8b949e;
      stroke-width: 1.5;
      opacity: 0.85;
    }
    .depgraph-svg .dep-line.completed {
      stroke: #3fb950;
      opacity: 0.6;
    }
    .depgraph-svg .task-node { cursor: pointer; }
    .depgraph-svg .task-node:hover .task-rect {
      filter: brightness(1.2);
    }
    .depgraph-svg .task-rect {
      stroke-width: 1.5;
      transition: filter 0.15s;
    }
    .depgraph-svg .task-rect.completed { fill: rgba(63,185,80,0.18); stroke: #3fb950; }
    .depgraph-svg .task-rect.completed.not-landed { fill: rgba(210,153,34,0.18); stroke: #d29922; }
    .depgraph-svg .task-rect.running   { fill: rgba(88,166,255,0.20); stroke: #58a6ff; animation: nodePulse 2s ease-in-out infinite; }
    .depgraph-svg .task-rect.failed    { fill: rgba(248,81,73,0.20);  stroke: #f85149; }
    .depgraph-svg .task-rect.pending   { fill: transparent;            stroke: #30363d; }
    .depgraph-svg .task-rect.skipped   { fill: rgba(210,153,34,0.18); stroke: #d29922; }

    /* Gate (milestone) pills — purple, pill-shaped */
    .depgraph-svg .gate-rect.completed { fill: rgba(63,185,80,0.25);  stroke: #3fb950; }
    .depgraph-svg .gate-rect.running   { fill: rgba(188,140,255,0.30); stroke: #bc8cff; animation: nodePulse 2s ease-in-out infinite; }
    .depgraph-svg .gate-rect.failed    { fill: rgba(248,81,73,0.25);  stroke: #f85149; }
    .depgraph-svg .gate-rect.pending   { fill: rgba(188,140,255,0.12); stroke: #bc8cff; }
    .depgraph-svg .gate-rect.skipped   { fill: rgba(210,153,34,0.18); stroke: #d29922; }

    .depgraph-svg .task-id-text {
      fill: var(--text-muted);
      font-size: 9px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-weight: 600;
    }
    .depgraph-svg .task-name-text {
      fill: var(--text);
      font-size: 10.5px;
      font-weight: 500;
    }
    .depgraph-svg .task-time-text {
      fill: var(--text-muted);
      font-size: 9px;
    }
    .depgraph-svg .gate-label {
      fill: #d2c0ff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .depgraph-svg .info-btn {
      cursor: pointer;
    }
    .depgraph-svg .info-btn circle {
      fill: rgba(139,148,158,0.25);
      stroke: var(--text-muted);
      stroke-width: 1.5;
      transition: all 0.15s;
    }
    .depgraph-svg .info-btn:hover circle {
      fill: var(--accent);
      stroke: var(--accent);
    }
    .depgraph-svg .info-btn text {
      fill: var(--text-muted);
      font-size: 9px;
      font-weight: 700;
      pointer-events: none;
      font-style: italic;
    }
    .depgraph-svg .info-btn:hover text {
      fill: #000;
    }

    .depgraph-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 16px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .depgraph-legend .lg-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .depgraph-legend .lg-swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      border: 1.5px solid;
      display: inline-block;
    }

    .depgraph-info-panel {

    .depgraph-info-panel .ip-status.running   { background: rgba(88,166,255,0.15); color: #58a6ff; }
    .depgraph-info-panel .ip-status.failed    { background: rgba(248,81,73,0.15); color: #f85149; }

    /* Graph toolbar */
    .depgraph-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .depgraph-toolbar select {

    .depgraph-toolbar .graph-btn {

      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;

    }
    .depgraph-toolbar .graph-btn:hover { color: var(--text); border-color: var(--accent); }
    .depgraph-toolbar .graph-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
    /* ---- Task Detail Modal ---- */
    .task-detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);

    }
    .task-detail-overlay.open { display: flex; justify-content: center; align-items: flex-start; }
    .task-detail-card {

    }
    @keyframes tdSlideIn {

    }
    .td-header {

      font-family: 'SFMono-Regular', Consolas, monospace;

    .td-label {

    .td-status-badge.completed { background: rgba(63,185,80,0.15); color: var(--green); }
    .td-status-badge.completed.not-landed { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .td-status-badge.running    { background: rgba(88,166,255,0.15); color: var(--blue); }
    .td-status-badge.failed     { background: rgba(248,81,73,0.15); color: var(--red); }
    .td-status-badge.pending    { background: rgba(139,148,158,0.1); color: var(--text-muted); }
    .td-cost-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
    }
    .td-cost-cell {
      background: rgba(88,166,255,0.06);
      border: 1px solid rgba(88,166,255,0.12);

    }
    .td-cost-cell .num {

    .td-nav {

      border: 1px solid var(--border);

    }

    .td-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .td-description {
